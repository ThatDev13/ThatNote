<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1b1a18" />
    <title>ThatNote Editor</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,700&family=Space+Grotesk:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  </head>
  <body>
    <div class="page">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">
            <img src="icon.svg" alt="ThatNote" />
          </span>
          <div>
            <p class="brand-title">ThatNote</p>
            <p class="brand-subtitle">Rich Text / Markdown / LaTeX Studio</p>
          </div>
        </div>
        <div class="top-actions">
          <button class="ghost" id="pdfBtn" type="button">Download PDF</button>
          <button class="ghost" id="resetBtn" type="button" disabled>New Session</button>
          <button class="primary" id="exportBtn" type="button">Export</button>
        </div>
      </header>

      <main class="shell">
        <section class="panel" id="editorPanel">
          <div class="editor-header">
            <div class="field">
              <label for="noteName">Note name</label>
              <input id="noteName" type="text" placeholder="Untitled note" />
            </div>
            <div class="mode-select" role="group" aria-label="Editor mode">
              <button class="mode-btn is-active" data-mode="markdown" type="button">Markdown</button>
              <button class="mode-btn" data-mode="latex" type="button">LaTeX</button>
              <button class="mode-btn" data-mode="rich" type="button">Rich Text</button>
            </div>
            <div class="status" id="statusText">Ready</div>
          </div>

          <div class="editor-body">
            <div class="editor-pane">
              <div class="pane-title">Write</div>
              <textarea id="markdownEditor" placeholder="Write Markdown or LaTeX here..."></textarea>
              <div
                id="richEditor"
                class="rich-editor hidden"
                contenteditable="true"
                data-placeholder="Write rich text here..."
              ></div>
            </div>
            <div class="preview-pane" id="previewPane">
              <div class="pane-title">Live preview</div>
              <div id="preview" class="preview"></div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <div class="modal hidden" id="sessionModal" aria-hidden="true" hidden>
      <div class="modal-card">
        <div class="modal-header">
          <h2>Start a new session</h2>
          <button
            class="ghost"
            id="modalClose"
            type="button"
            data-modal-close
            onclick="window.ThatNoteModal && window.ThatNoteModal.close()"
          >
            Close
          </button>
        </div>
        <p>Choose how you want to begin.</p>
        <div class="card-grid">
          <button class="card" id="modalNew" type="button">
            <span class="card-title">Create new note</span>
            <span class="card-body">Start with a fresh document.</span>
          </button>
          <label class="card" for="fileInput" id="modalImport">
            <span class="card-title">Import existing file</span>
            <span class="card-body">Load a .md, .txt, or .html document.</span>
          </label>
        </div>
      </div>
    </div>

    <input id="fileInput" type="file" accept=".md,.txt,.html" hidden />

    <script src="editor.js"></script>
  </body>
</html>
